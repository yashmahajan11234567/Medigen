server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: add expires headers for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Try to serve the file, if not found fall back to index.html (for JS chunks that might be hashed)
        try_files $uri =404;
    }
}